server {
    server_name 3.38.167.218;

    listen 80;
    client_max_body_size 10M;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $fastapi_upstream "fastapi:8000";

    # 추후 certbot ssl 인증서 갱신 시 필요
    location /.well-known/acme-challenge/ {
       root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://$fastapi_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    location /auth-demo/app/assets/ {
        alias /var/www/auth-demo/assets/;
        access_log off;
        expires 7d;
    }

    location /auth-demo/app/ {
        alias /var/www/auth-demo/;
        try_files $uri $uri/ /auth-demo/app/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location = /auth-demo/login {
        default_type text/html;
        alias /var/www/auth-demo/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location = /auth-demo/signup {
        default_type text/html;
        alias /var/www/auth-demo/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location = /auth-demo {
        return 302 /auth-demo/login;
    }

    location / {
        proxy_pass http://$fastapi_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }
}
