<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - AI Health</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .admin-badge {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        .btn-admin {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .form-control {
            border-radius: 15px;
            border: 2px solid #e9ecef;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .alert-danger {
            border-radius: 15px;
            border: none;
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card admin-login-card border-0 p-4">
                    <div class="card-body text-center">
                        <div class="mb-4">
                            <img src="/auth-demo/app/assets/mascot.png" alt="약속이" style="width: 80px; height: auto;">
                        </div>
                        
                        <div class="admin-badge">
                            🛡️ ADMIN ACCESS
                        </div>
                        
                        <h3 class="fw-bold mb-1">관리자 로그인</h3>
                        <p class="text-muted mb-4">AI Health 시스템 관리</p>
                        
                        <div id="error-message" class="alert alert-danger d-none" role="alert">
                            <strong>로그인 실패!</strong> <span id="error-text"></span>
                        </div>
                        
                        <form id="admin-login-form">
                            <div class="mb-3">
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="email" 
                                    placeholder="관리자 이메일"
                                    required
                                >
                            </div>
                            <div class="mb-4">
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    placeholder="비밀번호"
                                    required
                                >
                            </div>
                            <button type="submit" class="btn btn-admin btn-primary w-100" id="login-btn">
                                <span id="login-text">관리자 로그인</span>
                                <span id="login-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
                            </button>
                        </form>
                        
                        <div class="mt-4 pt-3 border-top">
                            <small class="text-muted">
                                계정이 없으신가요? 
                                <a href="/admin/signup" class="text-decoration-none">관리자 회원가입</a>
                                <br><br>
                                일반 사용자이신가요? 
                                <a href="/auth-demo/login" class="text-decoration-none">일반 로그인</a>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_PREFIX = "/api/v1";
        
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginSpinner = document.getElementById('login-spinner');
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            // 로딩 상태
            loginBtn.disabled = true;
            loginText.textContent = '로그인 중...';
            loginSpinner.classList.remove('d-none');
            errorMessage.classList.add('d-none');
            
            try {
                const response = await fetch(`${API_PREFIX}/auth/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 토큰 저장
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', 'ADMIN');
                    
                    // 관리자 대시보드로 리다이렉트
                    window.location.href = '/auth-demo/app/dashboard';
                } else {
                    throw new Error(data.detail || '로그인에 실패했습니다.');
                }
            } catch (error) {
                errorText.textContent = error.message;
                errorMessage.classList.remove('d-none');
            } finally {
                // 로딩 상태 해제
                loginBtn.disabled = false;
                loginText.textContent = '관리자 로그인';
                loginSpinner.classList.add('d-none');
            }
        });
        
        // 이미 로그인된 관리자인지 확인
        window.addEventListener('load', () => {
            const token = localStorage.getItem('access_token');
            const role = localStorage.getItem('user_role');
            
            if (token && role === 'ADMIN') {
                window.location.href = '/auth-demo/app/dashboard';
            }
        });
    </script>
</body>
</html>
