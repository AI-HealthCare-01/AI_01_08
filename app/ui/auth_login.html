<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Health Login</title>
    <style>
      :root {
        --bg: #f1f6fb;
        --card: #ffffff;
        --text: #102a43;
        --muted: #486581;
        --line: #d9e2ec;
        --accent: #0b7285;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 15%, #e4f3ff 0%, var(--bg) 50%);
      }
      .card {
        width: min(420px, calc(100vw - 32px));
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 22px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 14px;
      }
      .row { margin-bottom: 12px; }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--muted);
      }
      input, select, button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px;
        font-size: 14px;
      }
      button {
        border: 0;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(120deg, var(--accent), #0a9396);
      }
      .sub-btn {
        margin-top: 8px;
        background: #fff;
        color: var(--accent);
        border: 1px solid var(--accent);
      }
      .helper {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .hidden { display: none; }
      .social {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed var(--line);
      }
      pre {
        margin-top: 14px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 10px;
        min-height: 64px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div id="loginPanel">
        <h1>로그인</h1>
        <p>로그인 성공 시 다음 페이지로 자동 이동합니다.</p>
        <div class="row"><label>이메일</label><input id="email" value="user_demo@gmail.com" /></div>
        <div class="row"><label>비밀번호</label><input id="password" type="password" value="User_123" /></div>
        <div class="row">
          <label>Role</label>
          <select id="role"><option>PATIENT</option><option>GUARDIAN</option></select>
        </div>
        <button onclick="login()">로그인</button>
        <button class="sub-btn" onclick="showSignup()">회원가입 화면으로 이동</button>
        <div class="helper">기본 이동 경로: <code>/auth-demo/app</code></div>
        <div class="social">
          <button class="sub-btn" onclick="socialLogin('kakao')">카카오로 로그인</button>
        </div>
      </div>

      <div id="signupPanel" class="hidden">
        <h1>회원가입</h1>
        <p>회원가입 후 자동으로 로그인 화면으로 돌아갑니다.</p>
        <div class="row"><label>이메일</label><input id="su_email" value="user_demo@gmail.com" /></div>
        <div class="row"><label>비밀번호</label><input id="su_password" type="password" value="User_123" /></div>
        <div class="row"><label>이름</label><input id="su_name" value="kimuser" /></div>
        <div class="row">
          <label>성별</label>
          <select id="su_gender"><option>FEMALE</option><option>MALE</option></select>
        </div>
        <div class="row"><label>생년월일</label><input id="su_birth" value="1996-03-04" /></div>
        <div class="row"><label>휴대폰</label><input id="su_phone" value="010-1234-6789" /></div>
        <div class="row">
          <label style="display:flex; gap:8px; align-items:flex-start; cursor:pointer; user-select:none;">
            <input id="su_privacy" type="checkbox" style="width:auto; margin-top:2px;" />
            <span>
              개인정보 수집·이용에 동의합니다(필수)
              <div style="margin-top:4px; font-size:12px; color: var(--muted); line-height:1.45;">
                수집·이용 목적: 회원가입, 본인확인, 서비스 제공 및 고객지원<br />
                수집 항목: 이름, 이메일(아이디), 비밀번호, 성별, 생년월일, 휴대폰 번호<br />
                보유·이용 기간: 회원 탈퇴 시까지(단, 관계법령에 따라 보관이 필요한 경우 해당 기간 보관)<br />
                동의 거부 권리: 동의를 거부할 수 있으나, 동의 거부 시 회원가입이 제한됩니다.
              </div>
            </span>
          </label>
        </div>
        <button onclick="signup()">회원가입</button>
        <button class="sub-btn" onclick="showLogin()">로그인 화면으로 돌아가기</button>
      </div>

      <pre id="out">로그인 결과가 여기에 표시됩니다.</pre>
    </section>

    <script>
      function showLogin() {
        document.getElementById("loginPanel").classList.remove("hidden");
        document.getElementById("signupPanel").classList.add("hidden");
      }

      function showSignup() {
        document.getElementById("signupPanel").classList.remove("hidden");
        document.getElementById("loginPanel").classList.add("hidden");
      }

      function setOut(payload) {
        document.getElementById("out").textContent = JSON.stringify(payload, null, 2);
      }

      async function login() {
        const payload = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          role: document.getElementById("role").value,
        };
        setOut({ status: "loading", request: payload });
        try {
          const res = await fetch("/api/v1/auth/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json", accept: "application/json" },
            body: JSON.stringify(payload),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            setOut({ status: res.status, ok: false, body });
            return;
          }

          if (body.access_token) {
            sessionStorage.setItem("access_token", body.access_token);
          }
          sessionStorage.setItem("login_role", payload.role);
          setOut({ status: res.status, ok: true, body, redirect_to: "/auth-demo/app" });
          window.location.href = "/auth-demo/app";
        } catch (err) {
          setOut({ status: "fetch_error", error: String(err) });
        }
      }

      async function signup() {
        if (!document.getElementById("su_privacy").checked) {
          setOut({ status: "validation_error", action: "signup", message: "개인정보 수집·이용에 동의해 주세요." });
          return;
        }
        const payload = {
          email: document.getElementById("su_email").value,
          password: document.getElementById("su_password").value,
          name: document.getElementById("su_name").value,
          gender: document.getElementById("su_gender").value,
          birth_date: document.getElementById("su_birth").value,
          phone_number: document.getElementById("su_phone").value,
        };
        setOut({ status: "loading", action: "signup", request: payload });
        try {
          const res = await fetch("/api/v1/auth/signup", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json", accept: "application/json" },
            body: JSON.stringify(payload),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            setOut({ status: res.status, ok: false, body });
            return;
          }

          document.getElementById("email").value = payload.email;
          document.getElementById("password").value = payload.password;
          setOut({
            status: res.status,
            ok: true,
            body,
            message: "회원가입 성공. 로그인 화면으로 이동합니다.",
          });
          showLogin();
        } catch (err) {
          setOut({ status: "fetch_error", action: "signup", error: String(err) });
        }
      }

      async function socialLogin(provider) {
        setOut({ status: "loading", action: "social_login", provider });
        try {
          const res = await fetch(`/api/v1/auth/social/${provider}/login?role=PATIENT`, {
            method: "GET",
            credentials: "include",
            headers: { accept: "application/json" },
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.authorize_url) {
            setOut({ status: res.status, ok: false, body: data });
            return;
          }
          window.location.href = data.authorize_url;
        } catch (err) {
          setOut({ status: "fetch_error", action: "social_login", error: String(err) });
        }
      }
    </script>
  </body>
</html>
