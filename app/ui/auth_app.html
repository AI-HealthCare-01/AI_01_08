<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Health App Demo</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #17202a;
        --muted: #566573;
        --line: #d5dde5;
        --accent: #0b7285;
        --accent-2: #0f9d58;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        background: radial-gradient(circle at 10% 10%, #eaf7ff 0%, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        max-width: 980px;
        margin: 32px auto;
        padding: 0 16px 48px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }
      h1 { margin: 0; font-size: 28px; }
      p { margin: 0 0 20px; color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }
      .card h2 { margin: 0 0 12px; font-size: 18px; }
      .row { margin-bottom: 10px; }
      label { display: block; font-size: 13px; margin-bottom: 4px; color: var(--muted); }
      input, select, button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        background: #fff;
      }
      button {
        cursor: pointer;
        border: none;
        background: linear-gradient(120deg, var(--accent), #0a9396);
        color: #fff;
        font-weight: 600;
      }
      .btn-green { background: linear-gradient(120deg, var(--accent-2), #2a9d8f); }
      .logout {
        width: auto;
        padding: 10px 14px;
        background: linear-gradient(120deg, #ef4444, #dc2626);
      }
      .full { grid-column: 1 / -1; }
      pre {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        max-height: 280px;
        overflow: auto;
        font-size: 12px;
      }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <h1>로그인 이후 페이지</h1>
        <button class="logout" onclick="logout()">로그아웃</button>
      </div>
      <p>로그인 시 저장된 토큰으로 API를 호출합니다.</p>

      <div class="grid">
        <section class="card">
          <h2>소셜 로그인 시작 URL</h2>
          <div class="row">
            <label>Provider</label>
            <select id="social_provider"><option value="kakao">kakao</option><option value="naver">naver</option></select>
          </div>
          <div class="row">
            <label>Role</label>
            <select id="social_role"><option>PATIENT</option><option>GUARDIAN</option></select>
          </div>
          <button class="btn-green" onclick="socialStart()">소셜 로그인 바로 이동</button>
        </section>

        <section class="card">
          <h2>토큰 리프레시</h2>
          <p style="font-size:12px;">refresh_token 쿠키 기반으로 갱신합니다.</p>
          <button onclick="refreshToken()">토큰 갱신 요청</button>
        </section>

        <section class="card">
          <h2>유저 정보</h2>
          <button onclick="userMe()">내 정보 조회 (/api/v1/users/me)</button>
          <div class="row" style="margin-top:10px;"><label>수정 이름</label><input id="me_name" value="updated-name" /></div>
          <button class="btn-green" onclick="userMePatch()">내 정보 수정 (/api/v1/users/me)</button>
        </section>

        <section class="card">
          <h2>알림 API</h2>
          <button onclick="notifUnreadCount()">안읽은 개수 (/api/v1/notifications/unread-count)</button>
          <button style="margin-top:8px;" onclick="notifList()">목록 조회 (/api/v1/notifications)</button>
          <button style="margin-top:8px;" onclick="notifSettingsGet()">설정 조회 (/api/v1/notifications/settings)</button>
          <div class="row" style="margin-top:10px;">
            <label>intake_reminder</label>
            <select id="nf_intake"><option value="true">true</option><option value="false">false</option></select>
          </div>
          <button class="btn-green" onclick="notifSettingsPatch()">설정 수정 (/api/v1/notifications/settings)</button>
          <button style="margin-top:8px;" onclick="notifReadAll()">전체 읽음 (/api/v1/notifications/read-all)</button>
        </section>

        <section class="card full">
          <h2>응답</h2>
          <pre id="out">결과가 여기에 표시됩니다.</pre>
        </section>
      </div>
    </div>

    <script>
      function getAccessToken() {
        return sessionStorage.getItem("access_token") || "";
      }

      async function ensureAccessToken() {
        if (getAccessToken()) {
          return true;
        }
        try {
          const res = await fetch("/api/v1/auth/token/refresh", {
            method: "GET",
            credentials: "include",
            headers: { accept: "application/json" },
          });
          const body = await res.json().catch(() => ({}));
          if (res.ok && body && body.access_token) {
            sessionStorage.setItem("access_token", body.access_token);
            return true;
          }
        } catch (_) {
          // ignore
        }
        return false;
      }

      function setOut(payload) {
        document.getElementById("out").textContent = JSON.stringify(payload, null, 2);
      }

      function authHeaders(isJsonBody) {
        const headers = { accept: "application/json" };
        if (isJsonBody) {
          headers["Content-Type"] = "application/json";
        }
        const accessToken = getAccessToken();
        if (accessToken) {
          headers.Authorization = `Bearer ${accessToken}`;
        }
        return headers;
      }

      async function callApi(path, method, body) {
        const ok = await ensureAccessToken();
        if (!ok && path !== "/api/v1/auth/token/refresh") {
          window.location.href = "/auth-demo/login";
          return;
        }
        setOut({ status: "loading", method, url: path, request: body ?? null });
        try {
          const res = await fetch(path, {
            method,
            credentials: "include",
            headers: authHeaders(Boolean(body)),
            body: body ? JSON.stringify(body) : undefined,
          });
          const text = await res.text();
          let parsed = text;
          try { parsed = JSON.parse(text); } catch (_) {}

          if (res.ok && parsed && parsed.access_token) {
            sessionStorage.setItem("access_token", parsed.access_token);
          }
          setOut({ status: res.status, ok: res.ok, body: parsed });
        } catch (err) {
          setOut({ status: "fetch_error", error: String(err) });
        }
      }

      async function logout() {
        try {
          await fetch("/api/v1/auth/logout", { method: "POST", credentials: "include" });
        } catch (_) {
          // ignore
        } finally {
          sessionStorage.removeItem("access_token");
          sessionStorage.removeItem("login_role");
          window.location.href = "/auth-demo/login";
        }
      }

      function refreshToken() {
        return callApi("/api/v1/auth/token/refresh", "GET");
      }

      function userMe() {
        return callApi("/api/v1/users/me", "GET");
      }

      function userMePatch() {
        return callApi("/api/v1/users/me", "PATCH", {
          name: document.getElementById("me_name").value,
        });
      }

      function notifUnreadCount() {
        return callApi("/api/v1/notifications/unread-count", "GET");
      }

      function notifList() {
        return callApi("/api/v1/notifications?limit=20", "GET");
      }

      function notifSettingsGet() {
        return callApi("/api/v1/notifications/settings", "GET");
      }

      function notifSettingsPatch() {
        return callApi("/api/v1/notifications/settings", "PATCH", {
          intake_reminder: document.getElementById("nf_intake").value === "true",
        });
      }

      function notifReadAll() {
        return callApi("/api/v1/notifications/read-all", "PATCH");
      }

      async function socialStart() {
        const provider = document.getElementById("social_provider").value;
        const role = document.getElementById("social_role").value;
        const path = `/api/v1/auth/social/${provider}/login?role=${role}`;
        setOut({ status: "loading", action: "social_redirect", path });
        try {
          const res = await fetch(path, {
            method: "GET",
            credentials: "include",
            headers: authHeaders(false),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.authorize_url) {
            setOut({ status: res.status, ok: false, body: data });
            return;
          }
          setOut({ status: res.status, ok: true, authorize_url: data.authorize_url, redirecting: true });
          window.location.href = data.authorize_url;
        } catch (err) {
          setOut({ status: "fetch_error", error: String(err) });
        }
      }

      (async () => {
        const ok = await ensureAccessToken();
        if (!ok) {
          window.location.href = "/auth-demo/login";
        }
      })();
    </script>
  </body>
</html>
